# =============================================================================
# ZIPPYRA — Amazon MSK (Kafka) Cluster Configuration
# 100M customer scale | ap-south-1 Mumbai primary
# Version 1.0 | March 2026 | Confidential
#
# Broker sizing rule: 1 broker per 50K msgs/sec sustained throughput
# At 100M users peak = ~14K msgs/sec → 12 brokers with 40% headroom
# =============================================================================

msk_cluster:
  cluster_name: zippyra-kafka-prod
  kafka_version: "3.6.0"
  region: ap-south-1
  availability_zones: [ap-south-1a, ap-south-1b, ap-south-1c]

  broker_node_group:
    instance_type: kafka.m5.4xlarge      # 16 vCPU | 64 GB RAM
    number_of_broker_nodes: 12           # 4 per AZ — always multiple of AZ count
    storage_per_broker_gb: 8000          # 8 TB NVMe per broker
    storage_autoscaling:
      enabled: true
      max_gb: 16000
      target_utilization_pct: 70

  encryption:
    in_transit: TLS                      # mTLS between brokers + clients
    at_rest: AWS_OWNED_KMS

  authentication:
    sasl_scram: true                     # username/password per service
    iam: true                            # IAM roles for EKS service accounts

  # ── Broker-level kafka configs ──────────────────────────────────────────
  broker_config:
    # Retention: broker default (overridden per topic where needed)
    log.retention.hours: 168             # 7 days default
    log.retention.bytes: -1              # unlimited bytes (use time-based)
    log.segment.bytes: 536870912         # 512 MB segments

    # Replication
    default.replication.factor: 3
    min.insync.replicas: 2               # writes ACK only after 2 replicas confirm
    unclean.leader.election.enable: false # NEVER allow data loss for leadership

    # Performance
    num.network.threads: 8
    num.io.threads: 16
    num.replica.fetchers: 4
    replica.fetch.max.bytes: 10485760    # 10 MB
    message.max.bytes: 10485760          # 10 MB max message size

    # Producer safety
    enable.idempotence: true             # exactly-once producer semantics
    acks: all                            # wait for all ISR replicas

    # Consumer
    auto.offset.reset: earliest          # new consumer groups start from beginning
    enable.auto.commit: false            # manual offset commit — never lose events

    # Tiered storage (for long-retention compliance topics)
    remote.log.storage.enable: true      # MSK Tiered Storage → S3
    log.local.retention.bytes: 1073741824 # keep 1GB locally, rest in S3

  # ── Monitoring ────────────────────────────────────────────────────────
  monitoring:
    enhanced_monitoring: PER_TOPIC_PER_BROKER
    prometheus_jmx_exporter: true
    cloudwatch_metrics: true

  alerts:
    - metric: KafkaDataLogsDiskUsed > 70%
      severity: P1
      action: "Trigger storage autoscaling. Investigate high-volume topics."
    - metric: ConsumerLag > topic_max_lag (per ConsumerGroup registry)
      severity: P1
      action: "Scale consumer service pods. Check for processing errors."
    - metric: UnderReplicatedPartitions > 0
      severity: P1
      action: "Broker node issue. Check broker health immediately."
    - metric: ActiveControllerCount != 1
      severity: P0
      action: "Split-brain risk. Page on-call SRE immediately."
    - metric: OfflinePartitionsCount > 0
      severity: P0
      action: "Data unavailable. Immediate escalation."
    - metric: NetworkRxDrops or NetworkTxDrops > 0
      severity: P2
      action: "Network saturation. Check broker NIC throughput."

# =============================================================================
# TOPIC CONFIGURATIONS
# Groups by volume tier for readability
# All topics: replication.factor=3, min.insync.replicas=2
# =============================================================================

topics:

  # ── TIER 1: CRITICAL PATH — payment + order + exit ──────────────────────
  # Wrong partition count here = payment confirmation delays

  - name: payment.confirmed
    partitions: 128
    replication_factor: 3
    retention_ms: 2592000000            # 30 days
    partition_key: user_id
    compression: lz4
    config:
      min.insync.replicas: "2"
      unclean.leader.election.enable: "false"

  - name: payment.initiated
    partitions: 128
    replication_factor: 3
    retention_ms: 604800000
