prometheus:
  prometheusSpec:
    retention: 15d
    resources:
      requests:
        cpu: "250m"
        memory: "1Gi"
      limits:
        cpu: "500m"
        memory: "2Gi"
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - zippyra-pilot
            - zippyra-prod

# ServiceMonitor: scrape all pods with port 8080 /metrics every 15s
additionalServiceMonitors:
  - name: zippyra-services
    selector:
      matchLabels: {}
    namespaceSelector:
      matchNames:
        - zippyra-pilot
        - zippyra-prod
    endpoints:
      - port: http
        targetPort: 8080
        path: /metrics
        interval: 15s

grafana:
  enabled: true
  adminPassword: ""
  admin:
    existingSecret: "grafana-admin"
    userKey: admin-user
    passwordKey: admin-password
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "100m"
        memory: "128Mi"

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
