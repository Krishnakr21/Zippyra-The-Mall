name: lint-and-test

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

env:
  GO_VERSION: "1.22"

jobs:
  lint-and-test:
    name: Lint & Test (Go)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: zippyra_test
          POSTGRES_USER: zippyra
          POSTGRES_PASSWORD: zippyra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      kafka:
        image: confluentinc/cp-kafka:7.5.0
        ports:
          - 9092:9092
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: ""
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_NODE_ID: 1
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
          KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
          CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    env:
      TEST_DB_URL: postgres://zippyra:zippyra_test@localhost:5432/zippyra_test?sslmode=disable
      TEST_REDIS_URL: redis://localhost:6379
      TEST_KAFKA_BROKERS: localhost:9092

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: platform/go.sum

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: platform
          args: --timeout=5m
          skip-cache: false

      - name: Run go vet
        working-directory: platform
        run: go vet ./...

      - name: Run tests
        working-directory: platform
        run: |
          go test ./... \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -timeout=120s \
            -race \
            -v

      - name: Check coverage thresholds
        working-directory: platform
        run: |
          # Per spec: ≥70% coverage required on payment, auth, exit-validation
          check_coverage() {
            PKG=$1
            THRESHOLD=$2
            COV=$(go tool cover -func=coverage.out | grep "$PKG" | awk '{print $3}' | tr -d '%' | sort -n | tail -1)
            if [ -z "$COV" ]; then
              echo "No coverage data for $PKG"
              return
            fi
            echo "$PKG coverage: $COV%"
            if (( $(echo "$COV < $THRESHOLD" | bc -l) )); then
              echo "FAIL: $PKG coverage $COV% is below threshold $THRESHOLD%"
              exit 1
            fi
          }
          check_coverage "payment-service" 70
          check_coverage "auth-service" 70
          check_coverage "exit-validation-service" 70

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: platform/coverage.out
          retention-days: 7

  lint-mobile:
    name: Lint (React Native)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: zippyra-customer-app/package-lock.json

      - name: Install dependencies
        working-directory: zippyra-customer-app
        run: npm ci

      - name: TypeScript check
        working-directory: zippyra-customer-app
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: zippyra-customer-app
        run: npx eslint . --ext .ts,.tsx --max-warnings=0

  lint-dashboard:
    name: Lint (Retailer Dashboard)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: zippyra-retailer-dashboard/package-lock.json

      - name: Install dependencies
        working-directory: zippyra-retailer-dashboard
        run: npm ci

      - name: TypeScript check
        working-directory: zippyra-retailer-dashboard
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: zippyra-retailer-dashboard
        run: npx eslint . --ext .ts,.tsx --max-warnings=0