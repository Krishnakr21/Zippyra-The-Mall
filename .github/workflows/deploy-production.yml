name: deploy-production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DEPLOY to confirm production deployment"
        required: true
        type: string

env:
  GO_VERSION: "1.22"
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  EKS_CLUSTER: production-zippyra
  K8S_NAMESPACE: zippyra-prod

jobs:
  validate-input:
    name: Validate Deployment Confirmation
    runs-on: ubuntu-latest

    steps:
      - name: Check confirmation input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DEPLOY" ]; then
            echo "ERROR: You must type DEPLOY to confirm. Got: ${{ github.event.inputs.confirm }}"
            exit 1
          fi
          echo "Deployment confirmed by ${{ github.actor }}"

  build-and-push:
    name: Build & Push Production Images
    runs-on: ubuntu-latest
    needs: validate-input
    environment: production  # enforces GitHub environment protection rules + approval

    strategy:
      matrix:
        service:
          - auth-service
          - store-service
          - catalog-service
          - cart-service
          - payment-service
          - order-service
          - exit-validation-service
          - notification-service
          - loyalty-service
          - inventory-service
          - warehouse-service
          - analytics-service
          - support-service
          - retailer-auth-service
          - admin-auth-service
          - admin-store-service
          - chain-hq-service
          - compliance-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: platform/services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ matrix.service }}:production-latest
          cache-from: type=gha,scope=prod-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=prod-${{ matrix.service }}

  run-migrations:
    name: Run DB Migrations (Production)
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install migrate CLI
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.0/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate /usr/local/bin/

      - name: Get DB credentials from Secrets Manager
        run: |
          DB_URL=$(aws secretsmanager get-secret-value \
            --secret-id production/zippyra/database \
            --query SecretString \
            --output text | jq -r '.url')
          echo "::add-mask::$DB_URL"
          echo "DB_URL=$DB_URL" >> $GITHUB_ENV

      - name: Run migrations
        run: |
          migrate \
            -path database/postgresql/migrations \
            -database "${{ env.DB_URL }}" \
            up

  deploy:
    name: Deploy to Production EKS
    runs-on: ubuntu-latest
    needs: run-migrations

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      - name: Record current image tags (for rollback)
        id: record-tags
        run: |
          SERVICES=(auth-service payment-service cart-service)
          for SERVICE in "${SERVICES[@]}"; do
            TAG=$(kubectl get deployment $SERVICE \
              -n ${{ env.K8S_NAMESPACE }} \
              -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "none")
            echo "${SERVICE}_prev_tag=$TAG" >> $GITHUB_ENV
          done

      - name: Deploy all services (rolling update)
        run: |
          SERVICES=(
            auth-service store-service catalog-service cart-service
            payment-service order-service exit-validation-service
            notification-service loyalty-service inventory-service
            warehouse-service analytics-service support-service
            retailer-auth-service admin-auth-service admin-store-service
            chain-hq-service compliance-service
          )

          for SERVICE in "${SERVICES[@]}"; do
            echo "Deploying $SERVICE to production..."
            kubectl set image deployment/$SERVICE \
              $SERVICE=${{ env.ECR_REGISTRY }}/$SERVICE:${{ github.sha }} \
              -n ${{ env.K8S_NAMESPACE }}
          done

      - name: Wait for rollouts
        run: |
          SERVICES=(
            auth-service store-service catalog-service cart-service
            payment-service order-service exit-validation-service
            notification-service loyalty-service inventory-service
            warehouse-service analytics-service support-service
            retailer-auth-service admin-auth-service admin-store-service
            chain-hq-service compliance-service
          )

          for SERVICE in "${SERVICES[@]}"; do
            kubectl rollout status deployment/$SERVICE \
              -n ${{ env.K8S_NAMESPACE }} \
              --timeout=300s
          done

      - name: Monitor error rate for 5 minutes (auto-rollback)
        run: |
          echo "Monitoring error rate for 5 minutes post-deploy..."
          PROMETHEUS_URL="${{ secrets.PROMETHEUS_URL }}"
          THRESHOLD=1  # 1% error rate per spec

          for i in $(seq 1 10); do
            sleep 30
            echo "Check $i/10 at $(date)..."

            # Query Prometheus for error rate across all services
            ERROR_RATE=$(curl -s "$PROMETHEUS_URL/api/v1/query" \
              --data-urlencode \
              'query=sum(rate(http_requests_total{status=~"5.."}[1m])) / sum(rate(http_requests_total[1m])) * 100' \
              | jq -r '.data.result[0].value[1] // "0"')

            echo "Current error rate: $ERROR_RATE%"

            if (( $(echo "$ERROR_RATE > $THRESHOLD" | bc -l) )); then
              echo "ERROR RATE $ERROR_RATE% EXCEEDS THRESHOLD $THRESHOLD% — ROLLING BACK"

              SERVICES=(
                auth-service store-service catalog-service cart-service
                payment-service order-service exit-validation-service
                notification-service loyalty-service inventory-service
                warehouse-service analytics-service support-service
                retailer-auth-service admin-auth-service admin-store-service
                chain-hq-service compliance-service
              )

              for SERVICE in "${SERVICES[@]}"; do
                echo "Rolling back $SERVICE..."
                kubectl rollout undo deployment/$SERVICE -n ${{ env.K8S_NAMESPACE }}
              done

              echo "ROLLBACK COMPLETE"
              exit 1
            fi
          done

          echo "Deployment stable — error rate within threshold for 5 minutes"

      - name: Log deployment to audit trail
        if: always()
        run: |
          STATUS=${{ job.status }}
          echo "Production deployment by ${{ github.actor }}"
          echo "Commit: ${{ github.sha }}"
          echo "Status: $STATUS"
          echo "Time: $(date -u)"